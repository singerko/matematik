<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Gradient -->
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle Base -->
  <rect x="64" y="64" width="896" height="896" rx="192" fill="url(#bg_grad)" />

  <!-- Decorative Math Symbols (Low Opacity) -->
  <g opacity="0.1" fill="#f8fafc">
    <path d="M200 300 h100 v-100 h40 v100 h100 v40 h-100 v100 h-40 v-100 h-100 z" /> <!-- Plus -->
    <path d="M750 250 h120 v30 h-120 z" /> <!-- Minus -->
    <circle cx="250" cy="750" r="25" />
    <path d="M220 790 h60 v15 h-60 z" />
    <circle cx="250" cy="845" r="25" /> <!-- Division -->
    <path d="M780 720 l30 -30 l40 40 l40 -40 l30 30 l-40 40 l40 40 l-30 30 l-40 -40 l-40 40 l-30 -30 l40 -40 z" /> <!-- Multi -->
  </g>

  <!-- Central "M" - Stylized -->
  <g filter="url(#shadow)">
    <!-- Main M Shape -->
    <path d="M300 700 V350 L512 550 L724 350 V700" stroke="#f0f0ee" stroke-width="100" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Accent Dot/Element in Brand Green -->
    <circle cx="512" cy="300" r="60" fill="#6bb800" />
  </g>

  <!-- "Land" Style Accent Line -->
  <rect x="300" y="750" width="424" height="20" rx="10" fill="#6bb800" opacity="0.8" />
</svg>
